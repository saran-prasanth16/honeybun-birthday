<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Memory Compass ✨</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap');

        :root {
            --bg-deep: #050304;
            --rosegold-light: #e0bfb8;
            --rosegold-main: #b76e79;
            --rosegold-dark: #63333d;
            --text-light: #f3e5e5;
            --glow-active: rgba(255, 42, 95, 0.8);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, #1a0f12 0%, var(--bg-deep) 100%);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- BACKGROUND DUST --- */
        #particle-canvas {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
        }

        /* --- INITIAL CALIBRATION OVERLAY (Needed for iOS Gyro Permissions) --- */
        #calibration-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 3, 4, 0.95); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 1s ease;
        }

        .calib-btn {
            background: linear-gradient(135deg, var(--rosegold-main) 0%, var(--rosegold-dark) 100%);
            border: 1px solid var(--rosegold-light); padding: 15px 40px; border-radius: 30px;
            color: var(--text-light); font-family: 'Montserrat', sans-serif; font-size: 0.9rem;
            letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 30px rgba(183, 110, 121, 0.4);
            animation: pulseGlow 2s infinite alternate;
        }

        /* --- THE COMPASS --- */
        #compass-view {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            transition: all 1.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0; transform: scale(0.9);
        }

        #compass-view.active { opacity: 1; transform: scale(1); }
        
        /* The shattered effect when unlocked */
        #compass-view.shattered { opacity: 0; transform: scale(1.5); pointer-events: none; filter: blur(10px); }

        .header-text {
            font-family: 'Cormorant Garamond', serif; font-size: 2.2rem;
            color: var(--rosegold-light); font-style: italic; margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(183, 110, 121, 0.5); text-align: center;
        }

        .sub-text {
            font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase;
            color: var(--rosegold-main); margin-bottom: 50px; font-weight: 400; text-align: center;
        }

        /* The main dial ring */
        .compass-ring {
            width: 280px; height: 280px; border-radius: 50%;
            position: relative; display: flex; justify-content: center; align-items: center;
            border: 2px solid rgba(183, 110, 121, 0.2);
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(183, 110, 121, 0.1);
            background: radial-gradient(circle, #0a0506 0%, #160a0d 100%);
        }

        /* Outer dashed tracker */
        .compass-ring::before {
            content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px;
            border-radius: 50%; border: 1px dashed rgba(183, 110, 121, 0.4);
            pointer-events: none;
        }

        /* The SVG Progress Ring (Fills up when aligned) */
        .progress-ring {
            position: absolute; top: -20px; left: -20px;
            transform: rotate(-90deg); /* Start at 12 o'clock */
            pointer-events: none;
        }
        .progress-circle {
            transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease;
            stroke-linecap: round;
        }

        /* Degree Markers */
        .marker {
            position: absolute; font-family: 'Montserrat', sans-serif;
            font-size: 1rem; font-weight: 500; color: var(--rosegold-dark);
        }
        .m-n { top: 15px; }
        .m-e { right: 15px; }
        .m-s { bottom: 15px; }
        .m-w { left: 15px; }

        /* The rotating needle container */
        .needle-container {
            position: absolute; width: 100%; height: 100%;
            transition: transform 0.1s linear; /* Smooth real-time rotation */
        }

        /* The glowing needle */
        .needle {
            position: absolute; top: 15%; left: 50%;
            width: 4px; height: 35%;
            background: linear-gradient(to top, transparent, var(--rosegold-main));
            transform: translateX(-50%);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--rosegold-main);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        /* Needle tip */
        .needle::after {
            content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
            width: 10px; height: 10px; background: var(--rosegold-light); border-radius: 50%;
            box-shadow: 0 0 15px var(--rosegold-light);
        }

        /* Center pivot */
        .pivot {
            width: 20px; height: 20px; background: var(--rosegold-main);
            border-radius: 50%; z-index: 5;
            box-shadow: 0 0 15px var(--rosegold-dark), inset 0 0 5px #fff;
        }

        /* Digital Readout */
        .readout {
            margin-top: 40px; font-family: 'Courier Prime', monospace;
            font-size: 2rem; color: var(--text-light); font-weight: 300;
            text-shadow: 0 0 10px var(--rosegold-main);
            transition: color 0.3s ease;
        }

        /* --- ALIGNED STATE (When pointing at exact 154) --- */
        .aligned .needle {
            background: linear-gradient(to top, transparent, #ff2a5f);
            box-shadow: 0 0 20px #ff2a5f;
        }
        .aligned .needle::after { background: #fff; box-shadow: 0 0 25px #fff; }
        .aligned .readout { color: #ff2a5f; text-shadow: 0 0 20px #ff2a5f; transform: scale(1.1); }

        /* --- FINAL REVEAL CARD --- */
        #final-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 50;
            transition: opacity 1.5s ease 0.5s; 
        }
        #final-screen.active { opacity: 1; pointer-events: all; }

        .reveal-card {
            background: linear-gradient(180deg, rgba(20, 10, 12, 0.85) 0%, rgba(10, 5, 6, 0.95) 100%);
            border: 1px solid rgba(183, 110, 121, 0.3); border-radius: 24px;
            padding: 50px 30px; text-align: center; width: 85%; max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 40px rgba(183, 110, 121, 0.15);
            backdrop-filter: blur(15px);
            transform: scale(0.9); transition: transform 1.5s cubic-bezier(0.25, 0.8, 0.25, 1) 0.5s;
        }
        #final-screen.active .reveal-card { transform: scale(1); }

        .reveal-title { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: var(--rosegold-light); font-style: italic; margin-bottom: 20px; }
        .reveal-body { font-size: 1.05rem; color: #d8c8cb; line-height: 1.8; font-weight: 300; margin-bottom: 30px; white-space: pre-line;}
        .reveal-footer { font-size: 0.75rem; letter-spacing: 4px; color: var(--rosegold-main); text-transform: uppercase; font-weight: 600; }

        @keyframes pulseGlow { 0% { box-shadow: 0 10px 30px rgba(183, 110, 121, 0.2); } 100% { box-shadow: 0 10px 40px rgba(183, 110, 121, 0.6); } }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="calibration-screen">
        <h1 class="header-text" style="margin-bottom: 30px;">Memory Compass</h1>
        <button class="calib-btn" id="start-btn">Calibrate Device</button>
    </div>

    <div id="compass-view">
        <h1 class="header-text">Navigate to 154°</h1>
        <div class="sub-text">The coordinates of our day</div>

        <div class="compass-ring" id="compass-ring">
            <svg class="progress-ring" width="320" height="320">
                <circle id="progress-circle" class="progress-circle" cx="160" cy="160" r="150" fill="transparent" stroke="rgba(255, 42, 95, 0.8)" stroke-width="4"></circle>
            </svg>

            <div class="marker m-n">N</div>
            <div class="marker m-e">E</div>
            <div class="marker m-s">S</div>
            <div class="marker m-w">W</div>
            
            <div class="needle-container" id="needle-container">
                <div class="needle"></div>
            </div>
            <div class="pivot"></div>
        </div>

        <div class="readout" id="readout">000°</div>
    </div>

    <div id="final-screen">
        <div class="reveal-card">
            <h1 class="reveal-title">True North</h1>
            <div style="width: 40px; height: 1px; background: var(--rosegold-main); margin: 0 auto 25px auto;"></div>
            <p class="reveal-body">
                Before I met you, I was just wandering. 
                
                April 15th isn't just a birthday to me. It's the coordinates of the day my entire world found its direction.
                
                You are my True North, Ammu.
            </p>
            <div class="reveal-footer">Unlocked ✨</div>
        </div>
    </div>

    <script>
        // --- 1. AMBIENT PARTICLES ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    r: Math.random() * 1.5, alpha: Math.random(),
                    v: Math.random() * 0.3 + 0.1, pulsate: Math.random() * 0.02 + 0.01
                });
            }
        }
        window.addEventListener('resize', initCanvas);

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.y -= p.v;
                if (p.y < -10) { p.y = height + 10; p.x = Math.random() * width; }
                p.alpha += p.pulsate;
                if (p.alpha >= 0.8 || p.alpha <= 0.1) p.pulsate *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(224, 191, 184, ${p.alpha})`; 
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        initCanvas(); animateParticles();

        // --- 2. COMPASS LOGIC (EXACT PRECISION) ---
        const targetAngle = 154; // EXACTLY 15/4
        const holdTimeRequired = 2000; // Must hold perfectly for 2 seconds

        let currentAngle = 0;
        let displayedAngle = 0;
        let isUnlocked = false;
        let holdStartTime = 0;
        let isHolding = false;
        let animationFrameId;

        const compassView = document.getElementById('compass-view');
        const needleContainer = document.getElementById('needle-container');
        const readout = document.getElementById('readout');
        const progressCircle = document.getElementById('progress-circle');
        
        // Setup SVG Circle Math for the progress ring
        const radius = progressCircle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        progressCircle.style.strokeDasharray = `${circumference} ${circumference}`;
        progressCircle.style.strokeDashoffset = circumference;

        // Start Button
        document.getElementById('start-btn').addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                } catch (error) { console.error(error); }
            } else {
                // Non-iOS mobile devices
                window.addEventListener('deviceorientationabsolute', handleOrientation);
                window.addEventListener('deviceorientation', handleOrientation);
            }

            // Desktop Fallback: Track Mouse Position to calculate angle
            const isDesktop = !(/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent));
            if (isDesktop) {
                window.addEventListener('mousemove', handleMouseMove);
            }

            // Hide Calibration, Show Compass
            document.getElementById('calibration-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('calibration-screen').style.display = 'none';
                compassView.classList.add('active');
                updateCompass(); // Start render loop
            }, 1000);
        });

        // Mobile: Calculate angle from Gyroscope
        function handleOrientation(event) {
            if (isUnlocked) return;
            let heading = event.webkitCompassHeading || Math.abs(event.alpha - 360);
            if (heading) currentAngle = heading;
        }

        // Desktop: Calculate angle from mouse relative to center of screen
        function handleMouseMove(e) {
            if (isUnlocked) return;
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dx = e.clientX - cx;
            const dy = e.clientY - cy;
            
            let angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
            if (angle < 0) angle += 360;
            currentAngle = angle;
        }

        // Render Loop
        function updateCompass() {
            if (isUnlocked) return;

            // Smooth interpolation (Lerp)
            let diff = currentAngle - displayedAngle;
            while(diff < -180) diff += 360;
            while(diff > 180) diff -= 360;
            displayedAngle += diff * 0.08; 

            // Normalize for display
            let displayVal = Math.round(displayedAngle);
            if(displayVal < 0) displayVal += 360;
            if(displayVal >= 360) displayVal -= 360;

            // Check for EXACT Match
            if (displayVal === targetAngle) {
                // ALIGNED EXACTLY!
                compassView.classList.add('aligned');
                
                // Magnetic snap to stop jittering while holding
                needleContainer.style.transform = `rotate(${targetAngle}deg)`;
                readout.innerText = `${targetAngle.toString().padStart(3, '0')}°`;
                
                if (!isHolding) {
                    isHolding = true;
                    holdStartTime = Date.now();
                    if(navigator.vibrate) navigator.vibrate(50); // Haptic bump when perfectly aligned
                } else {
                    // Calculate holding progress
                    const elapsedTime = Date.now() - holdStartTime;
                    const percent = Math.min((elapsedTime / holdTimeRequired) * 100, 100);
                    
                    // Fill the SVG ring
                    const offset = circumference - (percent / 100) * circumference;
                    progressCircle.style.strokeDashoffset = offset;

                    if (percent >= 100) triggerUnlock();
                }
            } else {
                // Not Aligned - Show normal rotation and text
                compassView.classList.remove('aligned');
                isHolding = false;
                progressCircle.style.strokeDashoffset = circumference; // Empty ring
                
                needleContainer.style.transform = `rotate(${displayedAngle}deg)`;
                readout.innerText = `${displayVal.toString().padStart(3, '0')}°`;
            }

            animationFrameId = requestAnimationFrame(updateCompass);
        }

        // --- 3. WIN CONDITION ---
        function triggerUnlock() {
            isUnlocked = true;
            cancelAnimationFrame(animationFrameId);
            
            if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]); // Victory rumble

            // 1. Shatter the compass
            compassView.classList.add('shattered');
            
            // 2. Create explosion particles
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 15 + 5;
                particles.push({
                    x: cx, y: cy,
                    r: Math.random() * 3 + 1, alpha: 1,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    v: 0, pulsate: -0.02 // Fade out fast
                });
            }

            // Custom particle loop for explosion
            function explode() {
                particles.forEach(p => {
                    if(p.vx) { p.x += p.vx; p.y += p.vy; p.vx *= 0.9; p.vy *= 0.9; } // friction
                });
                if(particles[0].alpha > 0) requestAnimationFrame(explode);
            }
            explode();

            // 3. Show Final Reveal Card
            setTimeout(() => {
                document.getElementById('final-screen').classList.add('active');
            }, 1000);
        }
    </script>
</body>
</html>
