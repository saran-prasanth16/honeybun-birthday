<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day 3 🌟</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,500&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --deep-space: #010103;
            --core-color: #fdfbfb;
            --accent-pink: #ffb3c1;
            --accent-glow: rgba(255, 179, 193, 0.6);
            --stardust-color: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(15, 15, 20, 0.9);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }

        body {
            background-color: var(--deep-space);
            background-image: radial-gradient(circle at center, #10101a 0%, var(--deep-space) 80%);
            /* Mobile fixes: 100dvh adjusts for address bars, fixed position stops bouncing */
            height: 100dvh; width: 100vw;
            position: fixed; top: 0; left: 0;
            overflow: hidden;
            overscroll-behavior: none; 
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* Viewport containers */
        #game-view, #card-view {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 1s ease, transform 1s ease;
        }

        /* --- STAGE 1: The Game --- */
        #game-view { z-index: 10; opacity: 1; }
        
        /* Guide Text */
        .guide-text {
            position: absolute; top: 12%;
            text-align: center; width: 90%;
            /* Fluid typography scales with screen size */
            font-size: clamp(0.75rem, 3vw, 0.9rem); 
            font-weight: 300;
            color: #888; letter-spacing: 2px;
            text-transform: uppercase;
            animation: fadeInOut 4s infinite;
            pointer-events: none;
        }

        /* The central Core */
        .cosmic-core-container {
            width: 150px; height: 150px;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        .cosmic-core {
            width: 30px; height: 30px;
            background-color: var(--core-color);
            border-radius: 50%;
            box-shadow: 0 0 30px #fff, 0 0 60px var(--accent-glow), 0 0 100px var(--accent-glow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Background Starfield */
        #starfield {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
        .bg-star {
            position: absolute; background-color: white;
            border-radius: 50%; opacity: 0;
            transition: opacity 2s ease;
        }

        /* Stardust Particle */
        .stardust {
            position: absolute; pointer-events: none;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic; font-weight: 300;
            color: var(--accent-pink);
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            text-shadow: 0 0 5px var(--accent-pink);
            animation: dustFadeOut 1s forwards;
            z-index: 5;
        }

        /* Converging Words */
        .converging-word {
            position: absolute;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600; text-transform: uppercase;
            letter-spacing: 3px; color: white;
            font-size: clamp(0.7rem, 3vw, 0.9rem); 
            opacity: 0; pointer-events: none; z-index: 4;
        }

        /* Supernova Flash Overlay */
        #supernova-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: white; opacity: 0;
            pointer-events: none; z-index: 50;
        }

        /* --- STAGE 2: The Card --- */
        #card-view {
            z-index: 5; opacity: 0; transform: scale(0.9) translateY(20px);
            pointer-events: none;
            padding: 20px;
        }

        #card-view.active {
            opacity: 1; transform: scale(1) translateY(0);
            pointer-events: all;
        }

        .premium-card {
            background: var(--card-bg);
            width: 100%; max-width: 360px;
            /* Ensures card never overflows off tiny screens */
            max-height: 85dvh; 
            overflow-y: auto;
            /* Hides scrollbar for sleekness */
            scrollbar-width: none; 
            border-radius: 24px;
            border: 1px solid rgba(255, 179, 193, 0.2);
            padding: clamp(25px, 6vw, 40px) clamp(20px, 5vw, 30px);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 30px rgba(255, 179, 193, 0.1);
            position: relative;
        }
        .premium-card::-webkit-scrollbar { display: none; }

        .card-header {
            font-size: 0.8rem; letter-spacing: 3px;
            color: var(--accent-pink); text-transform: uppercase;
            margin-bottom: 10px; font-weight: 600;
        }

        .card-date {
            font-family: 'Cormorant Garamond', serif; font-style: italic;
            font-size: 1.2rem; color: #888; margin-bottom: 25px;
        }

        .card-body {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic; font-weight: 300;
            /* Fluid typography: perfectly scales text to fit screen width */
            font-size: clamp(1.4rem, 6vw, 1.8rem); 
            line-height: 1.4;
            color: #fdfdfd; margin-bottom: 35px;
            white-space: pre-line;
        }

        .final-icon { font-size: 2.2rem; color: var(--accent-pink); animation: pulse 2s infinite; }

        /* KEYFRAMES */
        @keyframes fadeInOut { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }
        @keyframes dustFadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(0.5); }
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        @keyframes wordConverge {
            0% { opacity: 0; transform: translate(var(--startX), var(--startY)) scale(1.2); }
            20% { opacity: 0.9; }
            100% { opacity: 0; transform: translate(0, 0) scale(0.5); }
        }
    </style>
</head>
<body>

    <div id="starfield"></div>
    <div id="supernova-overlay"></div>

    <div id="game-view">
        <p class="guide-text">Find stardust...<br>Guide it to the core</p>
        
        <div class="cosmic-core-container">
            <div class="cosmic-core" id="core"></div>
        </div>
    </div>

    <div id="card-view">
        <div class="premium-card">
            <div class="card-header">Day 3 / 15</div>
            <div class="card-date">Countdown to You</div>
            <div class="card-body">Good morning, whole universe.<br><br>The stars aligned the day I met you.<br><br>You bring light to my deepest space. ✨<br><br>Keep shining.</div>
            <div class="final-icon">🌟</div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const nicknames = ['honeybun', 'thangoo', 'pattu', 'ammu', 'pani bommai', '❤️', '✨'];
        const convergeWordsText = ["YOU", "ARE", "MY", "WHOLE", "UNIVERSE", "MY", "LOVE"];
        
        const targetDustCollected = 40; 

        // --- DOM Elements ---
        const gameView = document.getElementById('game-view');
        const cardView = document.getElementById('card-view');
        const core = document.getElementById('core');
        const starfield = document.getElementById('starfield');
        const supernova = document.getElementById('supernova-overlay');

        // --- Game State ---
        let dustCollected = 0;
        let gameActive = true;
        let isDragging = false;
        let coreBounds = core.getBoundingClientRect();
        
        window.addEventListener('resize', () => { coreBounds = core.getBoundingClientRect(); });

        // --- Initialization: Generate Background Starfield ---
        function initStarfield() {
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'bg-star';
                const size = Math.random() * 2 + 0.5;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.transitionDelay = `${Math.random() * 3}s`; 
                starfield.appendChild(star);
            }
        }
        initStarfield();

        // --- Interaction Logic ---
        window.addEventListener('touchstart', (e) => { if (gameActive) isDragging = true; createDust(e); }, { passive: false });
        window.addEventListener('mousedown', (e) => { if (gameActive) isDragging = true; createDust(e); });

        window.addEventListener('touchend', () => { isDragging = false; });
        window.addEventListener('mouseup', () => { isDragging = false; });

        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('mousemove', handleMove);

        function handleMove(e) {
            if (!gameActive || !isDragging) return;
            e.preventDefault(); 
            createDust(e);
        }

        function createDust(e) {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;

            const dust = document.createElement('div');
            dust.className = 'stardust';
            dust.innerText = nicknames[Math.floor(Math.random() * nicknames.length)];
            dust.style.left = `${x}px`;
            dust.style.top = `${y}px`;
            
            dust.style.transform = `translate(-50%, -50%) rotate(${Math.random() * 40 - 20}deg)`;
            
            gameView.appendChild(dust);
            
            setTimeout(() => { dust.remove(); }, 1000);

            checkCoreCollision(x, y);
        }

        function checkCoreCollision(x, y) {
            const coreCenterX = coreBounds.left + coreBounds.width / 2;
            const coreCenterY = coreBounds.top + coreBounds.height / 2;
            // Slightly smaller threshold on mobile feels more precise
            const proximityThreshold = 60; 

            const distance = Math.hypot(x - coreCenterX, y - coreCenterY);

            if (distance < proximityThreshold) {
                dustCollected++;
                updateGameState();
            }
        }

        // --- Game Progression & Supernova ---
        function updateGameState() {
            const progression = Math.min(dustCollected / targetDustCollected, 1);

            const stars = document.querySelectorAll('.bg-star');
            const starsToLight = Math.floor(stars.length * progression);
            for (let i = 0; i < starsToLight; i++) {
                stars[i].style.opacity = Math.random() * 0.7 + 0.1; 
            }

            // Make core brighter and bigger
            const coreScale = 1 + progression * 2.5; 
            const glowSize = 30 + progression * 70; 
            core.style.transform = `scale(${coreScale})`;
            core.style.boxShadow = `0 0 30px #fff, 0 0 ${glowSize}px var(--accent-glow), 0 0 ${glowSize + 20}px var(--accent-pink)`;

            if (dustCollected % 3 === 0 && progression > 0.3 && progression < 0.9) {
                createConvergingWord();
            }

            if (dustCollected >= targetDustCollected) {
                triggerSupernova();
            }
        }

        // Converging words effect
        function createConvergingWord() {
            if (convergeWordsText.length === 0) return;

            const word = document.createElement('div');
            word.className = 'converging-word';
            word.innerText = convergeWordsText.shift(); 
            
            // Adjusted math for mobile to ensure words spawn inside the screen edges
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.min(window.innerWidth, window.innerHeight) * 0.42; 
            const startX = Math.cos(angle) * dist;
            const startY = Math.sin(angle) * dist;
            
            word.style.setProperty('--startX', `${startX}px`);
            word.style.setProperty('--startY', `${startY}px`);
            
            word.style.animation = 'wordConverge 1.5s ease-out forwards';
            
            document.querySelector('.cosmic-core-container').appendChild(word);
            
            setTimeout(() => { word.remove(); }, 1500);
        }

        function triggerSupernova() {
            gameActive = false; 
            isDragging = false;

            supernova.style.transition = 'opacity 0.2s ease-in';
            supernova.style.opacity = 1;

            setTimeout(() => {
                gameView.style.display = 'none';
                cardView.classList.add('active');

                supernova.style.transition = 'opacity 1.5s ease-out';
                supernova.style.opacity = 0;
            }, 300); 
        }
    </script>
</body>
</html>
