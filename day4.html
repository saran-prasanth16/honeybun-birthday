<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day 4 ❤️</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,500;1,600&family=Montserrat:wght@200;300;400;500&display=swap');

        :root {
            --bg-dark: #0a0508;
            --accent-red: #ff3366;
            --accent-pink: #ff99ac;
            --text-main: #fcfcfc;
            --text-muted: #888;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }

        body {
            height: 100vh; width: 100vw;
            background-color: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease;
        }

        /* The background heartbeat pulse effect */
        #pulse-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255, 51, 102, 0.15) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        .heartbeat-anim {
            animation: heartPulse 1s infinite ease-in-out;
        }

        /* --- STAGE 1: The Scanner --- */
        #scanner-view {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .header-text {
            font-size: 0.8rem; letter-spacing: 4px;
            color: var(--accent-red); text-transform: uppercase;
            margin-bottom: 50px; font-weight: 500;
            text-align: center;
        }

        .status-text {
            height: 20px;
            font-size: 1rem; color: var(--text-muted);
            font-weight: 300; margin-top: 40px;
            text-align: center; transition: color 0.3s ease;
        }

        /* The Touch Target */
        .scanner-container {
            position: relative;
            width: 160px; height: 160px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }

        /* The SVG Ring */
        .progress-ring {
            position: absolute; top: 0; left: 0;
            transform: rotate(-90deg); /* Start at top */
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.1s linear;
            stroke-linecap: round;
        }

        /* The Heart Icon inside */
        .heart-icon {
            width: 50px; height: 50px;
            fill: none; stroke: var(--accent-red); stroke-width: 2;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(255, 51, 102, 0.4));
        }

        /* Error state animation */
        .glitch { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        /* --- STAGE 2: The Final Message Card --- */
        #card-view {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 20;
            opacity: 0; pointer-events: none;
            transform: scale(0.9);
            transition: all 1.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: radial-gradient(circle at center, #1a0b10 0%, var(--bg-dark) 100%);
        }

        #card-view.active {
            opacity: 1; transform: scale(1);
            pointer-events: all;
        }

        .premium-card {
            background: rgba(20, 10, 13, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 51, 102, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            width: 88%; max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 40px rgba(255, 51, 102, 0.05);
            position: relative;
        }

        .card-header {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            color: var(--text-main);
            margin-bottom: 25px;
            font-style: italic; font-weight: 500;
        }

        .card-body {
            font-size: 1rem; line-height: 1.8;
            color: #d1c5c7; margin-bottom: 35px;
            font-weight: 300; white-space: pre-line;
        }

        .highlight {
            color: var(--accent-pink);
            font-weight: 500; font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem; font-style: italic;
        }

        /* Animations */
        @keyframes heartPulse {
            0% { transform: scale(1); opacity: 0.2; }
            20% { transform: scale(1.05); opacity: 0.5; }
            40% { transform: scale(1); opacity: 0.2; }
            60% { transform: scale(1.1); opacity: 0.7; }
            80% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1); opacity: 0.2; }
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        @keyframes explodeOut {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 1; filter: brightness(2); }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="pulse-overlay"></div>

    <div id="scanner-view">
        <div class="header-text">Security Level: Maximum<br><span style="color:#555; font-size: 0.6rem; margin-top: 5px; display:block;">Access Restricted</span></div>
        
        <div class="scanner-container" id="touch-target">
            <svg class="progress-ring" width="160" height="160">
                <circle cx="80" cy="80" r="70" fill="transparent" stroke="#222" stroke-width="4"></circle>
                <circle class="progress-ring-circle" id="progress-circle" cx="80" cy="80" r="70" fill="transparent" stroke="#ff3366" stroke-width="6"></circle>
            </svg>
            
            <svg class="heart-icon" id="center-heart" viewBox="0 0 24 24">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
        </div>

        <div class="status-text" id="status-text">Press and hold to sync heartbeats</div>
    </div>

    <div id="card-view">
        <div class="premium-card">
            <h1 class="card-header">Access Granted</h1>
            <div class="card-body">
                Some people come into life and stay as memories…
				You came and became a feeling.
                
                I love you always, <span class="highlight">ammu</span>.
                
                Thank you for being my safe space.
            </div>
            <div class="header-text" style="margin-bottom: 0; color: var(--accent-pink);">Day 4 Unlocked ✨</div>
        </div>
    </div>

    <script>
        // --- Configuration & Setup ---
        const holdDuration = 4000; // 4 seconds to unlock
        let holdTimer;
        let progressInterval;
        let isHolding = false;
        let startTime;

        // DOM Elements
        const touchTarget = document.getElementById('touch-target');
        const progressCircle = document.getElementById('progress-circle');
        const statusText = document.getElementById('status-text');
        const centerHeart = document.getElementById('center-heart');
        const pulseOverlay = document.getElementById('pulse-overlay');
        const scannerView = document.getElementById('scanner-view');
        const cardView = document.getElementById('card-view');

        // Setup SVG Circle Math for the stroke dash
        const radius = progressCircle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        progressCircle.style.strokeDasharray = `${circumference} ${circumference}`;
        progressCircle.style.strokeDashoffset = circumference;

        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            progressCircle.style.strokeDashoffset = offset;
        }

        // Status messages based on progress percentage
        function updateStatusText(percent) {
            if (percent < 5) return "Press and hold to sync heartbeats...";
            if (percent < 30) return "Reading biometrics...";
            if (percent < 60) return "Analyzing heart rhythm...";
            if (percent < 90) return "Matching with soulmate profile...";
            return "Connection established ❤️";
        }

        // --- Interaction Logic ---

        function startHold(e) {
            if (e.type === 'touchstart') e.preventDefault(); // Prevent scrolling/zoom
            
            isHolding = true;
            startTime = Date.now();
            
            // UI Updates
            centerHeart.style.fill = 'rgba(255, 51, 102, 0.2)';
            centerHeart.style.transform = 'scale(0.9)';
            pulseOverlay.classList.add('heartbeat-anim');
            pulseOverlay.style.opacity = '1';

            // Vibration API (works on Android, degrades gracefully on iOS)
            if (navigator.vibrate) {
                // Heartbeat vibration pattern
                navigator.vibrate([100, 50, 100, 800, 100, 50, 100, 800, 100, 50, 100]);
            }

            // Loop to update progress ring
            progressInterval = setInterval(() => {
                const elapsedTime = Date.now() - startTime;
                const percent = Math.min((elapsedTime / holdDuration) * 100, 100);
                
                setProgress(percent);
                statusText.innerText = updateStatusText(percent);

                // Make the heart glow brighter as time goes on
                centerHeart.style.filter = `drop-shadow(0 0 ${10 + (percent/2)}px rgba(255, 51, 102, ${0.4 + (percent/100)}))`;

                if (percent >= 100) {
                    unlockSuccess();
                }
            }, 50);
        }

        function stopHold() {
            if (!isHolding) return;
            isHolding = false;
            
            clearInterval(progressInterval);
            
            // If they didn't finish, trigger the fail state
            const elapsedTime = Date.now() - startTime;
            if (elapsedTime < holdDuration) {
                triggerFail();
            }
        }

        function triggerFail() {
            // Reset Ring
            setProgress(0);
            
            // UI Reset
            centerHeart.style.fill = 'none';
            centerHeart.style.transform = 'scale(1)';
            centerHeart.style.filter = 'drop-shadow(0 0 10px rgba(255, 51, 102, 0.4))';
            
            pulseOverlay.classList.remove('heartbeat-anim');
            pulseOverlay.style.opacity = '0';
            
            if (navigator.vibrate) navigator.vibrate(0); // Stop vibration

            // Glitch effect
            touchTarget.classList.add('glitch');
            statusText.innerText = "Connection lost. Do not let go.";
            statusText.style.color = "var(--accent-red)";
            
            setTimeout(() => {
                touchTarget.classList.remove('glitch');
                statusText.style.color = "var(--text-muted)";
                statusText.innerText = "Press and hold to sync heartbeats";
            }, 1000);
        }

        function unlockSuccess() {
            clearInterval(progressInterval);
            isHolding = false;
            if (navigator.vibrate) navigator.vibrate([500]); // Long vibration on success

            statusText.innerText = "Access Granted.";
            statusText.style.color = "#fff";
            
            // Explode the scanner out
            touchTarget.style.animation = "explodeOut 1s forwards";
            
            // Fade into the message card
            setTimeout(() => {
                scannerView.style.opacity = '0';
                pulseOverlay.style.opacity = '0';
                
                setTimeout(() => {
                    scannerView.style.display = 'none';
                    cardView.classList.add('active');
                }, 800);
            }, 600);
        }

        // Attach Event Listeners
        // Mouse
        touchTarget.addEventListener('mousedown', startHold);
        window.addEventListener('mouseup', stopHold);
        
        // Touch (Mobile)
        touchTarget.addEventListener('touchstart', startHold, {passive: false});
        window.addEventListener('touchend', stopHold);
        window.addEventListener('touchcancel', stopHold);
    </script>
</body>
</html>
