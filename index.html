<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Thread to You ❤️</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap');

        :root {
            --bg-deep: #120306;
            --bg-light: #2a0812;
            --thread-glow: #ff2a5f;
            --rosegold: #e8b2c1;
            --text-light: #fff0f3;
            --text-muted: #a68a8f;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 0%, var(--bg-light) 0%, var(--bg-deep) 70%);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }

        /* --- 1. Cinematic Intro --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 2.5s ease-in-out;
        }

        .intro-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem; font-style: italic; color: var(--rosegold);
            text-align: center; opacity: 0;
            animation: cinematicFade 6s ease-in-out forwards;
            padding: 0 30px; line-height: 1.4;
        }

        /* --- 2. Live Canvas Background (Fireflies) --- */
        #firefly-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none;
        }

        /* --- 3. The Thread Timeline --- */
        #journey-container {
            position: relative; z-index: 10;
            width: 100%; max-width: 500px; margin: 0 auto; 
            padding: 100px 20px 150px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.8rem; color: var(--rosegold);
            margin-bottom: 10px; text-shadow: 0 0 25px rgba(232, 178, 193, 0.4);
            text-align: center; font-style: italic; font-weight: 600;
        }

        .header-subtitle {
            font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase;
            color: var(--text-muted); margin-bottom: 80px; text-align: center;
            font-weight: 300;
        }

        /* The SVG Red Thread connecting the nodes */
        #constellation-line {
            position: absolute; top: 250px; left: 0;
            width: 100%; height: calc(100% - 300px);
            z-index: 1; pointer-events: none;
            filter: drop-shadow(0 0 8px rgba(255, 42, 95, 0.6));
        }

        /* The Nodes */
        .star-node {
            position: relative; z-index: 2;
            width: 100%; height: 130px;
            display: flex; justify-content: center; align-items: center;
        }

        .star-core {
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Cormorant Garamond', serif; font-size: 1.6rem;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: absolute; font-weight: 600;
        }

        .star-unlocked {
            background: linear-gradient(135deg, rgba(255, 42, 95, 0.2), rgba(232, 178, 193, 0.1));
            border: 1px solid rgba(255, 42, 95, 0.6);
            color: var(--text-light);
            box-shadow: 0 0 20px rgba(255, 42, 95, 0.4), inset 0 0 15px rgba(255, 42, 95, 0.2);
            cursor: pointer;
            animation: heartPulse 2s infinite;
        }

        .star-unlocked:hover {
            transform: scale(1.15);
            background: linear-gradient(135deg, rgba(255, 42, 95, 0.4), rgba(232, 178, 193, 0.2));
            box-shadow: 0 0 35px rgba(255, 42, 95, 0.6), inset 0 0 20px rgba(255, 42, 95, 0.4);
            animation: none; /* Stop pulsing on hover so it feels solid */
        }

        .star-locked {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.2); cursor: not-allowed;
        }

        /* Node Positioning (Alternating Zig-Zag) */
        .star-node:nth-child(odd) .star-core { left: 18%; }
        .star-node:nth-child(even) .star-core { right: 18%; }

        /* Floating Dates */
        .star-date {
            position: absolute; font-size: 0.75rem; letter-spacing: 2px;
            color: var(--rosegold); text-transform: uppercase;
            opacity: 0.8; pointer-events: none; font-weight: 400;
        }
        .star-node:nth-child(odd) .star-date { left: calc(18% + 75px); }
        .star-node:nth-child(even) .star-date { right: calc(18% + 75px); }

        /* --- 4. Premium Modal --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(8, 2, 3, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 50; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.6s ease;
        }

        #modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal-card {
            width: 88%; max-width: 400px;
            background: linear-gradient(180deg, rgba(42, 8, 18, 0.85) 0%, rgba(18, 3, 6, 0.95) 100%);
            border: 1px solid rgba(255, 42, 95, 0.3); border-radius: 30px;
            padding: 50px 30px 40px 30px; text-align: center;
            transform: translateY(40px) scale(0.95); transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 50px rgba(255, 42, 95, 0.15);
            position: relative; overflow: hidden;
        }

        #modal-overlay.active .modal-card { transform: translateY(0) scale(1); }

        /* Modal Top Glow */
        .modal-card::before {
            content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
            width: 180px; height: 180px; background: radial-gradient(circle, rgba(255, 42, 95, 0.2) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
        }

        .modal-title {
            font-family: 'Cormorant Garamond', serif; font-size: 2.6rem;
            color: var(--rosegold); margin-bottom: 20px; font-style: italic; font-weight: 600;
        }

        .modal-text {
            font-size: 1.05rem; line-height: 1.8; color: var(--text-light);
            margin-bottom: 40px; font-weight: 300; white-space: pre-line;
        }

        .close-btn {
            background: linear-gradient(135deg, rgba(255, 42, 95, 0.2), transparent);
            border: 1px solid rgba(255, 42, 95, 0.5);
            color: var(--rosegold); padding: 14px 35px; border-radius: 40px;
            font-family: 'Montserrat', sans-serif; font-size: 0.75rem; letter-spacing: 3px;
            text-transform: uppercase; cursor: pointer; transition: all 0.3s ease;
        }

        .close-btn:hover { background: rgba(255, 42, 95, 0.3); box-shadow: 0 0 20px rgba(255, 42, 95, 0.3); color: #fff;}

        /* Animations */
        @keyframes cinematicFade {
            0% { opacity: 0; transform: scale(0.95); }
            20% { opacity: 1; transform: scale(1); }
            80% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }
        
        @keyframes heartPulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 42, 95, 0.4); }
            15% { transform: scale(1.08); box-shadow: 0 0 35px rgba(255, 42, 95, 0.6); }
            30% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 42, 95, 0.4); }
            45% { transform: scale(1.08); box-shadow: 0 0 35px rgba(255, 42, 95, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 42, 95, 0.4); }
        }

        @keyframes reject {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-text">
            They say an invisible red thread connects those destined to meet.<br><br>
            <span style="font-size: 1.3rem; color: #a68a8f; font-family: 'Montserrat', sans-serif; font-style: normal; font-weight: 300;">Ours is pulling me closer to you, day by day.</span>
        </div>
    </div>

    <canvas id="firefly-canvas"></canvas>

    <div id="journey-container">
        <h1 class="header-title">The Journey to You</h1>
        <p class="header-subtitle">15 Days to Celebrate My Pani Bommai</p>

        <svg id="constellation-line">
            <path id="path-line" fill="none" stroke="rgba(255, 42, 95, 0.4)" stroke-width="2" />
        </svg>

        <div id="nodes-container" style="width: 100%;">
            </div>

        <p class="header-subtitle" style="margin-top: 60px; margin-bottom: 0; opacity: 0.5;">Our Forever Begins Soon</p>
    </div>

    <div id="modal-overlay">
        <div class="modal-card">
            <h2 id="modal-title" class="modal-title">April 1st</h2>
            <div style="width: 40px; height: 1px; background: rgba(255, 42, 95, 0.5); margin: 0 auto 25px auto;"></div>
            <p id="modal-text" class="modal-text"></p>
            <button class="close-btn" onclick="closeModal()">Close With Love</button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const surprises = {
            1: "The first day of our countdown. My heart beats faster just thinking about April 15th. You are my world.",
            2: "Your laugh is my favorite soundtrack. I hope today gives you a million reasons to smile, ammu.",
            3: "I'm so proud of the woman you are. Every day with you is a blessing I never saw coming.",
            4: "Reminder: You are the most beautiful person I know—inside and out. ✨",
            5: "Only 10 days left! My biggest gift this year is just being by your side.",
            6: "Thinking about our first date today... I knew even then you were the one. 🌹",
            7: "Halfway there, gorgeous! You're the best part of my every single day, pattu.",
            8: "I love you more than words, more than music, and definitely more than sleep.",
            9: "You make my soul happy. Thank you for being my peace in this crazy world.",
            10: "5 days to go! The excitement is real. I have so much love waiting for you.",
            11: "You're not just my girlfriend; you're my best friend and my home. 🏠💖",
            12: "Counting the minutes until I can see that birthday glow on your face.",
            13: "Almost there! I hope you're feeling as special as you truly are.",
            14: "Tomorrow is the big day. My heart is so full just thinking about you. Sleep well, my honeybun.",
            15: "HAPPY BIRTHDAY MY LOVE! 🎉 Today, the world celebrates the day you were born, but I celebrate you every single second."
        };

        // --- INTRO SEQUENCE ---
        setTimeout(() => {
            const intro = document.getElementById('intro-overlay');
            intro.style.opacity = '0';
            setTimeout(() => intro.remove(), 2500);
        }, 5500); // Intro lasts slightly longer to read

        // --- CONSTELLATION GENERATOR ---
        const nodesContainer = document.getElementById('nodes-container');
        const pathLine = document.getElementById('path-line');
        
        // Let's set to true so you can test all the links today!
        const unlockAllForTesting = true; 

        const now = new Date();
        const month = now.getMonth(); 
        const date = now.getDate();

        // Generate the 15 nodes
        for (let i = 1; i <= 15; i++) {
            const node = document.createElement('div');
            node.className = 'star-node';
            
            const isUnlocked = unlockAllForTesting || (month === 3 && date >= i) || (month > 3);
            
            node.innerHTML = `
                <div class="star-core ${isUnlocked ? 'star-unlocked' : 'star-locked'}" id="star-${i}">
                    ${isUnlocked ? i : '·'}
                </div>
                <div class="star-date">April ${i}</div>
            `;

            if (isUnlocked) {
                node.onclick = () => {
                    if (i === 1) window.location.href = 'day1.html';
                    else if (i === 2) window.location.href = 'day2.html';
                    else if (i === 3) window.location.href = 'day3.html';
                    else if (i === 4) window.location.href = 'day4.html';
                    else openModal(i);
                };
            } else {
                node.onclick = () => {
                    const core = document.getElementById(`star-${i}`);
                    core.style.animation = 'none';
                    core.offsetHeight; /* trigger reflow */
                    core.style.animation = 'reject 0.4s ease';
                };
            }
            nodesContainer.appendChild(node);
        }

        // Draw the SVG connecting line after rendering
        window.addEventListener('load', drawLine);
        window.addEventListener('resize', drawLine);

        function drawLine() {
            let pathString = "";
            for (let i = 1; i <= 15; i++) {
                const star = document.getElementById(`star-${i}`);
                if(!star) continue;
                // Get position relative to the SVG container
                const rect = star.getBoundingClientRect();
                const containerRect = document.getElementById('journey-container').getBoundingClientRect();
                
                const x = rect.left - containerRect.left + (rect.width / 2);
                const y = rect.top - containerRect.top + (rect.height / 2) - 250; 

                if (i === 1) {
                    pathString += `M ${x} ${y} `;
                } else {
                    // Create a smooth bezier curve between points
                    const prevStar = document.getElementById(`star-${i-1}`);
                    const prevRect = prevStar.getBoundingClientRect();
                    const prevX = prevRect.left - containerRect.left + (prevRect.width / 2);
                    const prevY = prevRect.top - containerRect.top + (prevRect.height / 2) - 250;
                    
                    const cp1x = prevX;
                    const cp1y = prevY + (y - prevY) / 2;
                    const cp2x = x;
                    const cp2y = prevY + (y - prevY) / 2;

                    pathString += `C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x} ${y} `;
                }
            }
            pathLine.setAttribute('d', pathString);
        }

        // --- MODAL LOGIC ---
        function openModal(day) {
            document.getElementById('modal-title').innerText = `April ${day}`;
            document.getElementById('modal-text').innerText = surprises[day];
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        // --- INTERACTIVE FIREFLY CANVAS ---
        const canvas = document.getElementById('firefly-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let fireflies = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            fireflies = [];
            
            // Create 80 warm glowing fireflies
            for (let i = 0; i < 80; i++) {
                fireflies.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 2 + 1,
                    alpha: Math.random(),
                    velocity: (Math.random() * 0.3) + 0.1,
                    sway: Math.random() * Math.PI * 2,
                    pulsate: (Math.random() * 0.015) + 0.005
                });
            }
        }

        window.addEventListener('resize', initCanvas);

        function animateFireflies() {
            ctx.clearRect(0, 0, width, height);
            
            fireflies.forEach(fly => {
                // Drift gently upwards and sway side to side
                fly.y -= fly.velocity;
                fly.sway += 0.02;
                fly.x += Math.sin(fly.sway) * 0.5;

                if (fly.y < -10) { 
                    fly.y = height + 10; 
                    fly.x = Math.random() * width; 
                }
                
                // Pulsate glow
                fly.alpha += fly.pulsate;
                if (fly.alpha >= 0.8 || fly.alpha <= 0.1) fly.pulsate *= -1;

                // Draw glowing aura
                const gradient = ctx.createRadialGradient(fly.x, fly.y, 0, fly.x, fly.y, fly.radius * 3);
                gradient.addColorStop(0, `rgba(255, 179, 193, ${fly.alpha})`);
                gradient.addColorStop(1, `rgba(255, 42, 95, 0)`);

                ctx.beginPath();
                ctx.arc(fly.x, fly.y, fly.radius * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Draw solid core
                ctx.beginPath();
                ctx.arc(fly.x, fly.y, fly.radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${fly.alpha + 0.2})`;
                ctx.fill();
            });

            requestAnimationFrame(animateFireflies);
        }

        initCanvas();
        animateFireflies();
    </script>
</body>
</html>
