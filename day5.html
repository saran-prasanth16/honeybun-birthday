<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day 5 ✨</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap');

        :root {
            --sky-top: #050614;
            --sky-bottom: #1c1836;
            --water-top: #101223;
            --water-bottom: #03040a;
            --lantern-glow: #ffae00;
            --text-light: #fdfdfd;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-drag: none; /* Prevents native laptop drag bugs */
        }

        body {
            background-color: var(--sky-top);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh; width: 100vw;
        }

        /* --- BACKGROUND SCENERY --- */
        #sky {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 75%;
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 100%);
            z-index: 1;
        }

        #water {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 25%;
            background: linear-gradient(to bottom, var(--water-top) 0%, var(--water-bottom) 100%);
            z-index: 2;
            border-top: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 20px 30px rgba(0,0,0,0.5);
        }

        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }

        /* --- STORY TEXT --- */
        #story-text-container {
            position: absolute; top: 35%; left: 0; width: 100%;
            text-align: center; z-index: 10; pointer-events: none;
            padding: 0 30px;
        }

        .story-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem; color: #fff; font-style: italic;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            opacity: 0; transform: translateY(15px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .story-text.active { opacity: 1; transform: translateY(0); }

        /* --- INTERACTIVE LANTERN --- */
        #interaction-zone {
            position: absolute; bottom: 8%; left: 0;
            width: 100%; height: 300px;
            display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center;
            z-index: 20;
        }

        .lantern-wrapper {
            position: relative; cursor: grab;
            display: flex; justify-content: center; align-items: center;
            touch-action: none; padding: 40px; /* Big padding for easy laptop clicking */
        }
        .lantern-wrapper:active { cursor: grabbing; }

        .lantern {
            width: 45px; height: 60px;
            background: linear-gradient(to bottom, #ffdb58, #ff8c00);
            border-radius: 12px 12px 6px 6px;
            box-shadow: 0 0 30px var(--lantern-glow), inset 0 0 15px #fff;
            position: relative;
            animation: floatHover 3s infinite ease-in-out;
        }

        .lantern::after {
            content: ''; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            width: 8px; height: 12px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff; animation: flicker 0.1s infinite alternate;
        }

        .drag-hint {
            font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6); margin-top: 5px;
            animation: pulseHint 2s infinite; pointer-events: none;
            text-align: center; transition: opacity 0.3s;
        }

        /* --- BACKGROUND LANTERNS (FINALE) --- */
        .bg-lantern {
            position: absolute;
            background: linear-gradient(to bottom, #ffdb58, #ff8c00);
            border-radius: 6px 6px 3px 3px;
            box-shadow: 0 0 15px var(--lantern-glow);
            opacity: 0; bottom: -50px;
            animation: floatToSky var(--duration) ease-in forwards;
            z-index: 5;
        }

        /* --- FINAL REVEAL CARD --- */
        #final-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 6, 20, 0.6); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 50;
            transition: opacity 1.5s ease;
        }
        #final-screen.active { opacity: 1; pointer-events: all; }

        .reveal-card {
            background: linear-gradient(180deg, rgba(28, 24, 54, 0.85) 0%, rgba(10, 12, 35, 0.95) 100%);
            border: 1px solid rgba(255, 174, 0, 0.3); border-radius: 30px;
            padding: 50px 30px; text-align: center; width: 85%; max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 50px rgba(255, 174, 0, 0.15);
            transform: translateY(30px); transition: transform 1.5s ease;
        }
        #final-screen.active .reveal-card { transform: translateY(0); }

        .reveal-title { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: #ffdb58; font-style: italic; margin-bottom: 20px; }
        .reveal-body { font-size: 1.05rem; color: #e2e4ef; line-height: 1.8; font-weight: 300; margin-bottom: 30px; }
        .reveal-footer { font-size: 0.75rem; letter-spacing: 4px; color: #ff8c00; text-transform: uppercase; }

        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }
        @keyframes floatHover { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes flicker { 0% { opacity: 0.8; transform: translateX(-50%) scale(0.9); } 100% { opacity: 1; transform: translateX(-50%) scale(1.1); } }
        @keyframes pulseHint { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
        @keyframes floatToSky { 
            0% { transform: translateY(0) scale(1) translateX(0); opacity: 0; } 
            20% { opacity: var(--max-opacity); } 
            100% { transform: translateY(-120vh) scale(0.5) translateX(var(--drift)); opacity: 0; } 
        }
    </style>
</head>
<body>

    <div id="sky"></div>
    <div id="water"></div>

    <div id="story-text-container">
        <div id="story-text" class="story-text"></div>
    </div>

    <div id="interaction-zone">
        <div class="lantern-wrapper" id="draggable-lantern">
            <div class="lantern"></div>
        </div>
        <p class="drag-hint" id="drag-hint">Drag upward to release</p>
    </div>

    <div id="final-screen">
        <div class="reveal-card">
            <h1 class="reveal-title">My Guiding Light</h1>
            <div style="width: 40px; height: 1px; background: rgba(255, 174, 0, 0.5); margin: 0 auto 25px auto;"></div>
            <p class="reveal-body">
                They say if you make a wish on a lantern, it carries your heart to the stars.<br><br>
                But I don't need to make a wish anymore.<br><br>
                My greatest wish already came true the day I met you, ammu.
            </p>
            <div class="reveal-footer">Day 5 Unlocked ✨</div>
        </div>
    </div>

    <script>
        // --- 1. SETUP SCENERY ---
        const sky = document.getElementById('sky');
        for(let i=0; i<80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.width = star.style.height = `${Math.random() * 2 + 1}px`;
            star.style.setProperty('--duration', `${Math.random() * 3 + 1}s`);
            sky.appendChild(star);
        }

        // --- 2. STORY LOGIC ---
        const storyLines = [
            "For every day I have known you...",
            "My world has grown a little brighter...",
            "Because you are my favorite light. ✨"
        ];
        
        let lanternsReleased = 0;
        const totalLanterns = 3;
        const storyTextEl = document.getElementById('story-text');
        const dragHint = document.getElementById('drag-hint');
        const lanternWrapper = document.getElementById('draggable-lantern');

        // --- 3. BULLETPROOF DRAG LOGIC ---
        let startY = 0;
        let currentY = 0;
        let isDragging = false;
        let isAnimating = false; 

        // Helper for cross-device coordinates
        function getClientY(e) {
            return e.touches ? e.touches[0].clientY : e.clientY;
        }

        // Attach events
        lanternWrapper.addEventListener('mousedown', dragStart);
        lanternWrapper.addEventListener('touchstart', dragStart, {passive: false});

        window.addEventListener('mousemove', dragMove);
        window.addEventListener('touchmove', dragMove, {passive: false});

        window.addEventListener('mouseup', dragEnd);
        window.addEventListener('touchend', dragEnd);
        window.addEventListener('mouseleave', dragEnd); // Protects against laptop mouse leaving screen

        function dragStart(e) {
            if(isAnimating) return;
            isDragging = true;
            
            startY = getClientY(e);
            currentY = startY; 
            
            lanternWrapper.style.transition = 'none';
            dragHint.style.opacity = '0'; 
        }

        function dragMove(e) {
            if(!isDragging || isAnimating) return;
            e.preventDefault(); 
            
            currentY = getClientY(e);
            let dy = currentY - startY;
            
            // Only drag up
            if (dy < 0) {
                lanternWrapper.style.transform = `translateY(${dy}px)`;
            }
        }

        function dragEnd() {
            if(!isDragging || isAnimating) return;
            isDragging = false;
            
            let dy = currentY - startY;
            
            if (dy < -80) { // 80px threshold is easy to trigger on a laptop
                releaseLantern();
            } else {
                // Snap back
                lanternWrapper.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1)';
                lanternWrapper.style.transform = `translateY(0)`;
                dragHint.style.opacity = '1';
            }
        }

        function releaseLantern() {
            isAnimating = true;
            
            // 1. CREATE A CLONE TO FLY AWAY
            // This prevents browser bugs where animated objects get stuck off-screen
            const innerLantern = lanternWrapper.querySelector('.lantern');
            const rect = innerLantern.getBoundingClientRect();
            
            const clone = document.createElement('div');
            clone.className = 'lantern';
            clone.style.position = 'fixed';
            clone.style.left = rect.left + 'px';
            clone.style.top = rect.top + 'px';
            clone.style.zIndex = '999';
            clone.style.margin = '0';
            document.body.appendChild(clone);

            // 2. HIDE THE REAL ONE IMMEDIATELY
            lanternWrapper.style.transition = 'none';
            lanternWrapper.style.opacity = '0';
            lanternWrapper.style.transform = 'translateY(150px)'; // Hide it below the screen

            // 3. ANIMATE THE CLONE
            setTimeout(() => {
                clone.style.transition = 'transform 2s cubic-bezier(0.4, 0, 0.2, 1), opacity 1.5s ease-in';
                clone.style.transform = `translateY(-100vh) scale(0.4)`;
                clone.style.opacity = '0';
            }, 20);

            // Delete clone after it flies away
            setTimeout(() => clone.remove(), 2500);

            // 4. SHOW STORY TEXT
            setTimeout(() => {
                storyTextEl.innerText = storyLines[lanternReleased];
                storyTextEl.classList.add('active');
            }, 500);

            // 5. PREPARE FOR NEXT PULL
            setTimeout(() => {
                storyTextEl.classList.remove('active');
                lanternReleased++;

                if (lanternReleased < totalLanterns) {
                    setTimeout(resetLantern, 800); 
                } else {
                    setTimeout(triggerFinale, 500); 
                }
            }, 3500); 
        }

        function resetLantern() {
            // Smoothly bring the hidden real lantern back up
            lanternWrapper.style.transition = 'transform 1.2s ease-out, opacity 1s ease-out';
            lanternWrapper.style.transform = 'translateY(0)';
            lanternWrapper.style.opacity = '1';

            if(lanternReleased === 1) dragHint.innerText = "Guide another one...";
            if(lanternReleased === 2) dragHint.innerText = "One last time...";
            dragHint.style.opacity = '1';

            setTimeout(() => {
                isAnimating = false; // Allow dragging again
            }, 1200);
        }

        // --- 4. GRAND FINALE LOGIC ---
        function triggerFinale() {
            document.getElementById('interaction-zone').style.display = 'none';

            let spawnCount = 0;
            const spawnInterval = setInterval(() => {
                createBgLantern();
                spawnCount++;
                if(spawnCount >= 60) clearInterval(spawnInterval);
            }, 80);

            setTimeout(() => {
                document.getElementById('final-screen').classList.add('active');
            }, 2500);
        }

        function createBgLantern() {
            const bgLantern = document.createElement('div');
            bgLantern.className = 'bg-lantern';
            
            const size = Math.random() * 20 + 10; 
            bgLantern.style.width = `${size * 0.75}px`;
            bgLantern.style.height = `${size}px`;
            bgLantern.style.left = `${Math.random() * 100}vw`;
            
            bgLantern.style.setProperty('--duration', `${Math.random() * 8 + 6}s`); 
            bgLantern.style.setProperty('--drift', `${Math.random() * 100 - 50}px`); 
            bgLantern.style.setProperty('--max-opacity', `${Math.random() * 0.6 + 0.4}`); 
            
            bgLantern.style.animationDelay = `${Math.random() * 1.5}s`;

            sky.appendChild(bgLantern);
            setTimeout(() => bgLantern.remove(), 15000);
        }
    </script>
</body>
</html>
