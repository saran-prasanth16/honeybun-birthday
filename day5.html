<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day 5 ✨</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap');

        :root {
            --bg-deep: #050304;
            --rosegold-light: #e0bfb8;
            --rosegold-main: #b76e79;
            --rosegold-glow: rgba(183, 110, 121, 0.6);
            --text-main: #f3e5e5;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-drag: none;
        }

        body {
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, #1a0f12 0%, var(--bg-deep) 100%);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- STARDUST BACKGROUND --- */
        #particle-canvas {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
        }

        /* --- HEADER TEXT --- */
        .instruction {
            position: absolute; top: 12%; width: 100%;
            text-align: center; z-index: 10;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem; color: var(--rosegold-light); font-style: italic;
            text-shadow: 0 0 15px var(--rosegold-glow);
            pointer-events: none; transition: opacity 1s ease;
        }

        .sub-instruction {
            font-family: 'Montserrat', sans-serif; font-size: 0.75rem;
            letter-spacing: 4px; text-transform: uppercase; color: #804a53;
            margin-top: 10px; font-style: normal; font-weight: 400;
        }

        /* --- THE ASTROLABE (INTERACTIVE MECHANISM) --- */
        #astrolabe-container {
            position: relative; width: 340px; height: 340px;
            z-index: 20; display: flex; justify-content: center; align-items: center;
            border-radius: 50%;
            /* The invisible hit-area for mouse/touch math */
            touch-action: none; cursor: grab;
        }
        #astrolabe-container:active { cursor: grabbing; }

        /* The Rings */
        .ring {
            position: absolute; border-radius: 50%;
            display: flex; justify-content: center;
            transform-origin: center center;
            transition: box-shadow 0.4s ease, border-color 0.4s ease;
        }

        /* Outer Ring */
        #ring-outer {
            width: 320px; height: 320px;
            border: 2px dashed rgba(183, 110, 121, 0.3);
        }
        /* Middle Ring */
        #ring-mid {
            width: 230px; height: 230px;
            border: 2px dotted rgba(183, 110, 121, 0.4);
        }
        /* Inner Ring */
        #ring-inner {
            width: 140px; height: 140px;
            border: 2px solid rgba(183, 110, 121, 0.2);
        }

        /* The Glowing Star Nodes on each ring */
        .node {
            position: absolute; top: -8px; 
            width: 16px; height: 16px;
            background: var(--bg-deep);
            border: 2px solid var(--rosegold-main);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--rosegold-main);
        }

        /* Center Core */
        .core {
            position: absolute; width: 50px; height: 50px;
            background: radial-gradient(circle, var(--rosegold-light), var(--rosegold-main));
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px var(--rosegold-glow);
            font-size: 1.5rem; z-index: 5;
            animation: corePulse 3s infinite alternate;
        }

        /* Locked State Styles */
        .ring.locked {
            border-color: var(--rosegold-light); border-style: solid;
            box-shadow: 0 0 30px rgba(224, 191, 184, 0.4), inset 0 0 20px rgba(224, 191, 184, 0.2);
        }
        .ring.locked .node {
            background: var(--rosegold-light); border-color: #fff;
            box-shadow: 0 0 20px #fff, 0 0 40px var(--rosegold-light);
        }

        /* Finale Animation Classes */
        .astrolabe-unlocking .ring { animation: spinOut 2s cubic-bezier(0.5, 0, 0.2, 1) forwards !important; }
        .astrolabe-unlocking .core { animation: explodeCore 2s cubic-bezier(0.5, 0, 0.2, 1) forwards; }

        /* --- FINAL REVEAL CARD --- */
        #final-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 3, 4, 0.85); backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 50;
            transition: opacity 1.5s ease;
        }
        #final-screen.active { opacity: 1; pointer-events: all; }

        .reveal-card {
            background: linear-gradient(180deg, rgba(30,15,20,0.85) 0%, rgba(10,5,7,0.95) 100%);
            border: 1px solid rgba(183, 110, 121, 0.4); border-radius: 30px;
            padding: 50px 30px; text-align: center; width: 85%; max-width: 420px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 50px rgba(183, 110, 121, 0.2);
            transform: scale(0.9); transition: transform 1.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        #final-screen.active .reveal-card { transform: scale(1); }

        .reveal-title { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; color: var(--rosegold-light); font-style: italic; margin-bottom: 20px; }
        .reveal-body { font-size: 1.05rem; color: #d8c8cb; line-height: 1.8; font-weight: 300; margin-bottom: 30px; white-space: pre-line;}
        .reveal-footer { font-size: 0.75rem; letter-spacing: 4px; color: var(--rosegold-main); text-transform: uppercase; font-weight: 600; }

        /* KEYFRAMES */
        @keyframes corePulse { 0% { transform: scale(1); box-shadow: 0 0 20px var(--rosegold-glow); } 100% { transform: scale(1.1); box-shadow: 0 0 40px var(--rosegold-light); } }
        
        @keyframes spinOut { 
            0% { transform: rotate(0deg) scale(1); opacity: 1; } 
            50% { transform: rotate(360deg) scale(1.5); opacity: 1; border-color: #fff; }
            100% { transform: rotate(1080deg) scale(4); opacity: 0; } 
        }
        @keyframes explodeCore {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(3); opacity: 1; background: #fff; }
            100% { transform: scale(10); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="instruction" id="instruction-text">
        They say love is written in the stars.
        <div class="sub-instruction">Align ours.</div>
    </div>

    <div id="astrolabe-container">
        <div class="ring" id="ring-outer"><div class="node"></div></div>
        <div class="ring" id="ring-mid"><div class="node"></div></div>
        <div class="ring" id="ring-inner"><div class="node"></div></div>
        <div class="core">✨</div>
    </div>

    <div id="final-screen">
        <div class="reveal-card">
            <h1 class="reveal-title">Perfect Alignment</h1>
            <div style="width: 40px; height: 1px; background: var(--rosegold-main); margin: 0 auto 25px auto;"></div>
            <p class="reveal-body">
                The universe is completely chaotic, unpredictable, and wild.
                
                But the moment I found you, everything clicked into place. Every choice I ever made led me exactly to you.
                
                You are my center, ammu.
            </p>
            <div class="reveal-footer">Day 5 Unlocked ✨</div>
        </div>
    </div>

    <script>
        // --- 1. AMBIENT PARTICLES (STARDUST) ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    r: Math.random() * 1.5,
                    alpha: Math.random(),
                    v: Math.random() * 0.005, // rotation velocity around center
                    angle: Math.random() * Math.PI * 2,
                    dist: Math.random() * (width > height ? width : height)
                });
            }
        }
        window.addEventListener('resize', initCanvas);

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            const cx = width / 2; const cy = height / 2;
            
            particles.forEach(p => {
                p.angle += p.v;
                p.x = cx + Math.cos(p.angle) * p.dist;
                p.y = cy + Math.sin(p.angle) * p.dist;
                
                p.alpha += 0.01;
                if(p.alpha > 1) p.alpha = 0.1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(224, 191, 184, ${Math.abs(Math.sin(p.alpha))})`; 
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        initCanvas(); animateParticles();

        // --- 2. ASTROLABE MECHANICS (The Rotating Rings) ---
        const container = document.getElementById('astrolabe-container');
        
        // Define our 3 rings with random starting rotations
        const rings = [
            { el: document.getElementById('ring-inner'), rot: 145, radiusMin: 35, radiusMax: 85, isLocked: false },
            { el: document.getElementById('ring-mid'), rot: -80, radiusMin: 85, radiusMax: 135, isLocked: false },
            { el: document.getElementById('ring-outer'), rot: 210, radiusMin: 135, radiusMax: 180, isLocked: false }
        ];

        // Apply initial rotations
        rings.forEach(r => r.el.style.transform = `rotate(${r.rot}deg)`);

        let activeRing = null;
        let startAngle = 0;
        let startRot = 0;
        let isUnlocking = false;

        // Helper to get coordinates
        function getCoords(e) {
            if(e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            return { x: e.clientX, y: e.clientY };
        }

        // Attach listeners to the container to manage all rings perfectly
        container.addEventListener('mousedown', handleStart);
        container.addEventListener('touchstart', handleStart, {passive: false});

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive: false});

        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);

        function handleStart(e) {
            if(isUnlocking) return;
            const pos = getCoords(e);
            
            // Find center of the astrolabe
            const rect = container.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            
            const dx = pos.x - cx;
            const dy = pos.y - cy;
            const dist = Math.hypot(dx, dy);

            // Determine WHICH ring they touched based on distance from center
            activeRing = rings.find(r => dist >= r.radiusMin && dist <= r.radiusMax && !r.isLocked);

            if(activeRing) {
                // Calculate starting angle in degrees
                startAngle = Math.atan2(dy, dx) * (180 / Math.PI);
                startRot = activeRing.rot;
                document.body.style.cursor = 'grabbing';
            }
        }

        function handleMove(e) {
            if(!activeRing || isUnlocking) return;
            e.preventDefault(); // Prevent screen scroll
            
            const pos = getCoords(e);
            const rect = container.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            
            const dx = pos.x - cx;
            const dy = pos.y - cy;
            
            // Calculate current angle and the difference
            let currentAngle = Math.atan2(dy, dx) * (180 / Math.PI);
            let delta = currentAngle - startAngle;
            
            // Update ring rotation
            activeRing.rot = startRot + delta;
            activeRing.el.style.transform = `rotate(${activeRing.rot}deg)`;
        }

        function handleEnd() {
            if(!activeRing || isUnlocking) return;
            document.body.style.cursor = 'default';
            
            // Normalise rotation to 0-360 degrees
            let normalised = activeRing.rot % 360;
            if(normalised < 0) normalised += 360;

            // Target is 0 degrees (Node at the top). If within 15 degrees, SNAP!
            if(normalised < 15 || normalised > 345) {
                activeRing.rot = 0;
                activeRing.el.style.transform = `rotate(0deg)`;
                activeRing.el.classList.add('locked');
                activeRing.isLocked = true;
                
                checkWinCondition();
            }
            
            activeRing = null;
        }

        // --- 3. THE WIN CONDITION & FINALE ---
        function checkWinCondition() {
            const allLocked = rings.every(r => r.isLocked);
            
            if(allLocked) {
                isUnlocking = true;
                
                // Hide instructions
                document.getElementById('instruction-text').style.opacity = '0';

                // Trigger dramatic CSS animations
                setTimeout(() => {
                    container.classList.add('astrolabe-unlocking');
                    
                    // Speed up background particles
                    particles.forEach(p => p.v *= 10);
                }, 500);

                // Show final card
                setTimeout(() => {
                    document.getElementById('final-screen').classList.add('active');
                }, 2200);
            }
        }
    </script>
</body>
</html>
