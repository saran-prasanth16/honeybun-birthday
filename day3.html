<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Day 3 🌟</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,500&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --deep-space: #010103;
            --core-color: #fdfbfb;
            --accent-pink: #ffb3c1;
            --accent-glow: rgba(255, 179, 193, 0.6);
            --stardust-color: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(15, 15, 20, 0.9);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }

        body {
            background-color: var(--deep-space);
            background-image: radial-gradient(circle at center, #10101a 0%, var(--deep-space) 80%);
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: white;
            position: relative;
        }

        /* Viewport containers */
        #game-view, #card-view {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 1s ease, transform 1s ease;
        }

        /* --- STAGE 1: The Game --- */
        #game-view { z-index: 10; opacity: 1; }
        
        /* Guide Text */
        .guide-text {
            position: absolute; top: 12%;
            text-align: center; width: 80%;
            font-size: 0.9rem; font-weight: 300;
            color: #888; letter-spacing: 2px;
            text-transform: uppercase;
            animation: fadeInOut 4s infinite;
            pointer-events: none;
        }

        /* The central Core */
        .cosmic-core-container {
            width: 150px; height: 150px;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        .cosmic-core {
            width: 30px; height: 30px;
            background-color: var(--core-color);
            border-radius: 50%;
            box-shadow: 0 0 30px #fff, 0 0 60px var(--accent-glow), 0 0 100px var(--accent-glow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Background Starfield (generated by JS) */
        #starfield {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
        .bg-star {
            position: absolute; background-color: white;
            border-radius: 50%; opacity: 0;
            transition: opacity 2s ease;
        }

        /* Stardust Particle (generated by JS when dragging) */
        .stardust {
            position: absolute;
            pointer-events: none;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic; font-weight: 300;
            color: var(--accent-pink);
            font-size: 1rem;
            text-shadow: 0 0 5px var(--accent-pink);
            animation: dustFadeOut 1s forwards;
            z-index: 5;
        }

        /* Converging Words (generated by JS toward the end) */
        .converging-word {
            position: absolute;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600; text-transform: uppercase;
            letter-spacing: 3px; color: white;
            font-size: 0.8rem; opacity: 0;
            pointer-events: none; z-index: 4;
        }

        /* Supernova Flash Overlay */
        #supernova-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: white; opacity: 0;
            pointer-events: none; z-index: 50;
        }

        /* --- STAGE 2: The Card --- */
        #card-view {
            z-index: 5; opacity: 0; transform: scale(0.9) translateY(20px);
            pointer-events: none;
            padding: 20px;
        }

        #card-view.active {
            opacity: 1; transform: scale(1) translateY(0);
            pointer-events: all;
        }

        .premium-card {
            background: var(--card-bg);
            width: 100%; max-width: 380px;
            border-radius: 30px;
            border: 1px solid rgba(255, 179, 193, 0.2);
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 30px rgba(255, 179, 193, 0.1);
            position: relative; overflow: hidden;
        }

        /* Card Decoration Glimmer */
        .premium-card::after {
            content: ''; position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,179,193,0.05) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        .card-header {
            font-size: 0.8rem; letter-spacing: 3px;
            color: var(--accent-pink); text-transform: uppercase;
            margin-bottom: 10px; font-weight: 600;
        }

        .card-date {
            font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 1.2rem; color: #888; margin-bottom: 30px;
        }

        .card-body {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic; font-weight: 300;
            font-size: 1.8rem; line-height: 1.4;
            color: #fdfdfd; margin-bottom: 40px;
            white-space: pre-line;
        }

        .final-icon { font-size: 2.5rem; color: var(--accent-pink); animation: pulse 2s infinite; }

        /* KEYFRAMES */
        @keyframes fadeInOut { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.7; } }
        @keyframes dustFadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -100%) scale(0.5); }
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        @keyframes wordConverge {
            0% { opacity: 0; transform: translate(var(--startX), var(--startY)) scale(1.2); }
            20% { opacity: 0.8; }
            100% { opacity: 0; transform: translate(0, 0) scale(0.5); }
        }
    </style>
</head>
<body>

    <div id="starfield"></div>

    <div id="supernova-overlay"></div>

    <div id="game-view">
        <p class="guide-text">Find stardust...<br>Guide it to the core</p>
        
        <div class="cosmic-core-container">
            <div class="cosmic-core" id="core"></div>
        </div>
    </div>

    <div id="card-view">
        <div class="premium-card">
            <div class="card-header">Day 3 / 15</div>
            <div class="card-date">Countdown to You</div>
            <div class="card-body">Good morning, whole universe.<br><br>The stars aligned the day I met you.<br><br>You bring light to my deepest space. ✨<br><br>Keep shining.</div>
            <div class="final-icon">🌟</div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const nicknames = ['honeybun', 'thangoo', 'pattu', 'ammu', 'pani bommai', '❤️', '✨'];
        const convergeWordsText = ["YOU", "ARE", "MY", "WHOLE", "UNIVERSE", "MY", "LOVE"];
        
        // How much dragging required (lower number = faster game)
        const targetDustCollected = 40; 

        // --- DOM Elements ---
        const gameView = document.getElementById('game-view');
        const cardView = document.getElementById('card-view');
        const core = document.getElementById('core');
        const starfield = document.getElementById('starfield');
        const supernova = document.getElementById('supernova-overlay');

        // --- Game State ---
        let dustCollected = 0;
        let gameActive = true;
        let isDragging = false;
        let coreBounds = core.getBoundingClientRect();
        
        // Update core bounds on resize
        window.addEventListener('resize', () => { coreBounds = core.getBoundingClientRect(); });

        // --- Initialization: Generate Background Starfield ---
        function initStarfield() {
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'bg-star';
                const size = Math.random() * 2 + 0.5;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                // Randomized delays so they don't all appear at once
                star.style.transitionDelay = `${Math.random() * 3}s`; 
                starfield.appendChild(star);
            }
        }
        initStarfield();

        // --- Interaction Logic ---

        // Start Dragging
        window.addEventListener('touchstart', (e) => { if (gameActive) isDragging = true; createDust(e); }, { passive: false });
        window.addEventListener('mousedown', (e) => { if (gameActive) isDragging = true; createDust(e); });

        // Stop Dragging
        window.addEventListener('touchend', () => { isDragging = false; });
        window.addEventListener('mouseup', () => { isDragging = false; });

        // Dragging / Moving
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('mousemove', handleMove);

        function handleMove(e) {
            if (!gameActive || !isDragging) return;
            e.preventDefault(); // Prevent scrolling while dragging
            createDust(e);
        }

        // --- Core Interaction & Stardust Generation ---
        function createDust(e) {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;

            // 1. Create a trailing visual particle (nickname)
            const dust = document.createElement('div');
            dust.className = 'stardust';
            dust.innerText = nicknames[Math.floor(Math.random() * nicknames.length)];
            dust.style.left = `${x}px`;
            dust.style.top = `${y}px`;
            
            // Random slant
            dust.style.transform = `translate(-50%, -50%) rotate(${Math.random() * 40 - 20}deg)`;
            
            gameView.appendChild(dust);
            
            // Remove from DOM after animation finishes
            setTimeout(() => { dust.remove(); }, 1000);

            // 2. Check if drag point is within the core area
            checkCoreCollision(x, y);
        }

        function checkCoreCollision(x, y) {
            const coreCenterX = coreBounds.left + coreBounds.width / 2;
            const coreCenterY = coreBounds.top + coreBounds.height / 2;
            const proximityThreshold = 70; // Distance to count as "gathered"

            const distance = Math.hypot(x - coreCenterX, y - coreCenterY);

            if (distance < proximityThreshold) {
                dustCollected++;
                updateGameState();
            }
        }

        // --- Game Progression & Supernova ---
        function updateGameState() {
            // Percent complete (0 to 1)
            const progression = Math.min(dustCollected / targetDustCollected, 1);

            // 1. Light up background stars based on progress
            const stars = document.querySelectorAll('.bg-star');
            const starsToLight = Math.floor(stars.length * progression);
            for (let i = 0; i < starsToLight; i++) {
                stars[i].style.opacity = Math.random() * 0.7 + 0.1; // Random final opacity
            }

            // 2. Make core brighter and bigger
            const coreScale = 1 + progression * 2.5; // Up to 3.5x size
            const glowSize = 30 + progression * 70; // Up to 100px glow
            core.style.transform = `scale(${coreScale})`;
            core.style.boxShadow = `0 0 30px #fff, 0 0 ${glowSize}px var(--accent-glow), 0 0 ${glowSize + 20}px var(--accent-pink)`;

            // 3. Trigger converging words as we get closer to the target
            if (dustCollected % 3 === 0 && progression > 0.3 && progression < 0.9) {
                createConvergingWord();
            }

            // 4. Trigger Supernova!
            if (dustCollected >= targetDustCollected) {
                triggerSupernova();
            }
        }

        // Converging words effect (YOU ARE MY UNIVERSE...)
        function createConvergingWord() {
            if (convergeWordsText.length === 0) return;

            const word = document.createElement('div');
            word.className = 'converging-word';
            word.innerText = convergeWordsText.shift(); // Take the first word
            
            // Start position (edge of screen)
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.max(window.innerWidth, window.innerHeight) * 0.6;
            const startX = Math.cos(angle) * dist;
            const startY = Math.sin(angle) * dist;
            
            word.style.setProperty('--startX', `${startX}px`);
            word.style.setProperty('--startY', `${startY}px`);
            
            // CSS Animation handle the rest
            word.style.animation = 'wordConverge 1.5s ease-out forwards';
            
            // Add to the container of the core to utilize CSS relative positioning
            document.querySelector('.cosmic-core-container').appendChild(word);
            
            setTimeout(() => { word.remove(); }, 1500);
        }

        function triggerSupernova() {
            gameActive = false; // Stop further interactions
            isDragging = false;

            // Fade in white overlay rapidly
            supernova.style.transition = 'opacity 0.2s ease-in';
            supernova.style.opacity = 1;

            // Climax... then transition
            setTimeout(() => {
                // Hide game elements
                gameView.style.display = 'none';
                
                // Show card view
                cardView.classList.add('active');

                // Fade out white overlay slowly
                supernova.style.transition = 'opacity 1.5s ease-out';
                supernova.style.opacity = 0;
            }, 300); // Overlay stays white for 300ms
        }
    </script>
</body>
</html>
